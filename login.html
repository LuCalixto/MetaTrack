<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MetaTrack — Faça login e acompanhe suas metas e conquistas.">
    <title>Login - Meta Track</title>
    <link rel="icon" type="image/png" href="/main/minimalista.png">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey:            "AIzaSyDt_5U_ld8iDppsi9QFImrI4eBP61IgGc0",
            authDomain:        "ethania.firebaseapp.com",
            projectId:         "ethania",
            storageBucket:     "ethania.firebasestorage.app",
            messagingSenderId: "290971711529",
            appId:             "1:290971711529:web:655a835e54baeef36d4438",
            measurementId:     "G-DZDTQ0B676"
        };

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        window._auth                       = auth;
        window._signInWithEmailAndPassword = signInWithEmailAndPassword;
        window._sendPasswordResetEmail     = sendPasswordResetEmail;
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(138,43,226,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255,0,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(78,205,196,0.07) 0%, transparent 50%);
            pointer-events: none;
        }

        .auth-card {
            background: #1a1a2e;
            border: 1px solid #2a2a4e;
            border-radius: 20px;
            padding: 2.25rem 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            position: relative;
            animation: cardIn 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff00ff, #4ecdc4, transparent);
            border-radius: 2px;
        }

        .auth-logo {
            display: block;
            max-width: 150px;
            height: auto;
            margin: 0 auto 1.5rem;
        }
        .auth-title    { text-align: center; font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
        .auth-subtitle { text-align: center; font-size: 0.82rem; color: #666; margin-bottom: 1.75rem; }

        .form-group { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 1rem; }
        label { font-size: 0.78rem; font-weight: 600; color: #b0b0b0; }

        .input-wrapper { position: relative; }
        .input-icon {
            position: absolute; left: 0.75rem; top: 50%;
            transform: translateY(-50%); font-size: 0.85rem; pointer-events: none;
        }

        input[type="email"], input[type="password"], input[type="text"] {
            width: 100%;
            padding: 0.65rem 2.5rem 0.65rem 2.2rem;
            background: #0f0f1e;
            border: 1px solid #2a2a4e;
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 0.92rem;
            transition: border-color 0.25s, box-shadow 0.25s;
            outline: none;
        }
        input:focus { border-color: #ff00ff; box-shadow: 0 0 0 3px rgba(255,0,255,0.1); }

        .toggle-pw {
            position: absolute; right: 0.75rem; top: 50%;
            transform: translateY(-50%);
            background: none; border: none; color: #555;
            cursor: pointer; font-size: 0.85rem; padding: 0.1rem;
            transition: color 0.2s;
        }
        .toggle-pw:hover { color: #b0b0b0; }

        .btn-primary {
            width: 100%; padding: 0.75rem;
            background: linear-gradient(135deg, #8a2be2, #ff00ff);
            color: #fff; border: none; border-radius: 10px;
            font-size: 0.95rem; font-weight: 700; cursor: pointer;
            margin-top: 0.5rem;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(255,0,255,0.25);
        }
        .btn-primary:hover  { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,0,255,0.35); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .auth-links { margin-top: 1.25rem; display: flex; flex-direction: column; gap: 0.5rem; text-align: center; }
        .auth-links p { font-size: 0.82rem; color: #666; }
        .auth-links a { color: #b57bee; text-decoration: none; font-weight: 600; transition: color 0.2s; }
        .auth-links a:hover { color: #ff00ff; }

        .divider {
            display: flex; align-items: center; gap: 0.75rem;
            margin: 1rem 0; color: #444; font-size: 0.75rem;
        }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #2a2a4e; }

        .toast {
            position: fixed; bottom: 2rem; left: 50%;
            transform: translateX(-50%) translateY(20px);
            padding: 0.75rem 1.5rem; border-radius: 10px;
            font-size: 0.9rem; font-weight: 500; opacity: 0;
            pointer-events: none; transition: opacity 0.3s, transform 0.3s;
            z-index: 99999; min-width: 240px; text-align: center;
            background: #1f1f3e; color: #e0e0e0; border: 1px solid #555;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast-success { background: #1a3a2e; color: #81c784; border-color: #4caf50; }
        .toast-error   { background: #3a1a1a; color: #ff6b6b; border-color: #ff5252; }

        @media (max-width: 480px) {
            .auth-card { padding: 1.75rem 1.25rem; }
            .auth-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <img src="main/2logo-removebg-preview.png" alt="MetaTrack" class="auth-logo">
        <h1 class="auth-title">Bem-vindo de volta!</h1>
        <p class="auth-subtitle">Entre na sua conta para continuar</p>

        <form onsubmit="loginUser(event)">
            <div class="form-group">
                <label for="login-email">Email</label>
                <div class="input-wrapper">
                    <span class="input-icon">✉️</span>
                    <input type="email" id="login-email" placeholder="seu@email.com" required autocomplete="email">
                </div>
            </div>
            <div class="form-group">
                <label for="login-password">Senha</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle-pw" onclick="togglePw('login-password', this)">👁️</button>
                </div>
            </div>
            <button type="submit" id="login-btn" class="btn-primary">Entrar</button>
        </form>

        <div class="auth-links">
            <p><a href="#" onclick="resetPassword(); return false;">Esqueci minha senha</a></p>
            <div class="divider">ou</div>
            <p>Não tem conta? <a href="cadastro.html">Cadastre-se grátis</a></p>
            <p><a href="Inicial.html">← Voltar ao início</a></p>
        </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script>
        function togglePw(id, btn) {
            const input = document.getElementById(id);
            input.type  = input.type === 'password' ? 'text' : 'password';
            btn.textContent = input.type === 'text' ? '🙈' : '👁️';
        }

        function showToast(msg, type = 'default') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast' + (type === 'success' ? ' toast-success' : type === 'error' ? ' toast-error' : '');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        async function loginUser(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const pw    = document.getElementById('login-password').value;
            const btn   = document.getElementById('login-btn');
            btn.disabled = true; btn.textContent = 'Entrando...';
            try {
                const cred = await window._signInWithEmailAndPassword(window._auth, email, pw);
                const user = cred.user;
                localStorage.setItem('currentUser', JSON.stringify({ name: user.displayName || email.split('@')[0], email: user.email }));
                showToast('Login realizado! Redirecionando...', 'success');
                setTimeout(() => { window.location.href = 'Inicial.html'; }, 1000);
            } catch (err) {
                const msgs = {
                    'auth/invalid-credential':     'Email ou senha incorretos.',
                    'auth/too-many-requests':      'Muitas tentativas. Aguarde alguns minutos.',
                    'auth/network-request-failed': 'Sem conexão. Verifique sua internet.',
                    'auth/user-disabled':          'Esta conta foi desativada.',
                };
                showToast(msgs[err.code] || 'Erro ao fazer login.', 'error');
                btn.disabled = false; btn.textContent = 'Entrar';
            }
        }

        async function resetPassword() {
            const email = document.getElementById('login-email').value.trim();
            if (!email) { showToast('Digite seu email acima.', 'error'); return; }
            try {
                await window._sendPasswordResetEmail(window._auth, email);
                showToast('Email de recuperação enviado!', 'success');
            } catch (err) {
                const msgs = {
                    'auth/user-not-found':         'Nenhuma conta encontrada.',
                    'auth/invalid-email':           'Email inválido.',
                    'auth/network-request-failed':  'Sem conexão.',
                };
                showToast(msgs[err.code] || 'Erro ao enviar email.', 'error');
            }
        }
    </script>
</body>
</html>
