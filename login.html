<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Meta Track</title>
    <link rel="stylesheet" href="Inicial.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <h2>Login</h2>
            <form onsubmit="loginUser(event)">
                <div class="form-group">
                    <label for="login-email">Email:</label>
                    <input type="email" id="login-email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Senha:</label>
                    <input type="password" id="login-password" name="password" required>
                    <div id="login-error" class="error-message" style="display: none; color: red; font-size: 14px; margin-top: 5px;"></div>
                </div>
                <button type="submit">Entrar</button>
            </form>
            <p>Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
            <p><a href="Inicial.html">Voltar ao início</a></p>
        </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script>
        // Função de mostrar toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2300);
        }

        function loginUser(event) {
            event.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const users = JSON.parse(localStorage.getItem('users')) || [];
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                localStorage.setItem('currentUser', JSON.stringify({ name: user.name, email: user.email }));
                showToast('Login realizado com sucesso!');
                setTimeout(() => {
                    window.location.href = 'Inicial.html';
                }, 1000);
            } else {
                showToast('As informações de login estão incorretas. Verifique seu email e senha.');
            }
        }
    </script>
</body>
</html>
