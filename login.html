<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Meta Track</title>
    <link rel="stylesheet" href="Inicial.css">
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey:            "AIzaSyDNtC59j5VIY-mmznyjDUvZ1FkjQKgmf3o",
        authDomain:        "ethania.firebaseapp.com",
        projectId:         "ethania",
        storageBucket:     "ethania.firebasestorage.app",
        messagingSenderId: "290971711529",
        appId:             "1:290971711529:web:655a835e54baeef36d4438",
        measurementId:     "G-DZDTQ0B676"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
   window._auth                       = auth;
window._signInWithEmailAndPassword = signInWithEmailAndPassword;


</script>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <h2>Login</h2>
            <form onsubmit="loginUser(event)">
                <div class="form-group">
                    <label for="login-email">Email:</label>
                    <input type="email" id="login-email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Senha:</label>
                    <input type="password" id="login-password" name="password" required>
                    <div id="login-error" class="error-message" style="display: none; color: red; font-size: 14px; margin-top: 5px;"></div>
                </div>
                <button type="submit">Entrar</button>
            </form>
            <p>Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
            <p><a href="Inicial.html">Voltar ao início</a></p>
        </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script>
    function showToast(message, type = 'default') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast'; // reseta classes anteriores
    if (type === 'success') toast.classList.add('toast-success');
    if (type === 'error')   toast.classList.add('toast-error');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2300);
}

    async function loginUser(event) {
        event.preventDefault();
        const email    = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const btn      = document.querySelector('button[type="submit"]');

        btn.disabled = true; btn.textContent = 'Entrando...';

        try {
            const userCredential = await window._signInWithEmailAndPassword(window._auth, email, password);
            const user = userCredential.user;
            localStorage.setItem('currentUser', JSON.stringify({ name: user.displayName || email.split('@')[0], email: user.email }));
            showToast('Login realizado com sucesso!', 'success');
            setTimeout(() => { window.location.href = 'Inicial.html'; }, 1000);
        } catch (error) {
            const msgs = {
                'auth/invalid-credential':     'As informações de login estão incorretas. Verifique seu email e senha.',
                'auth/too-many-requests':      'Muitas tentativas. Aguarde alguns minutos.',
                'auth/network-request-failed': 'Sem conexão. Verifique sua internet.',
                'auth/user-disabled':          'Esta conta foi desativada.',
            };
            showToast(msgs[error.code] || 'Erro ao fazer login. Tente novamente.', 'error');
            btn.disabled = false; btn.textContent = 'Entrar';
        }
    }
</script>
</body>
</html>
