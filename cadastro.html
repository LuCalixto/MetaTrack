<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MetaTrack — Crie sua conta e comece a gerenciar suas metas hoje.">
    <title>Cadastro - Meta Track</title>
    <link rel="stylesheet" href="Inicial.css">
     <link rel="icon" type="image/png" href="/main/minimalista.png">
    <script src="config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        window._auth                           = auth;
        window._createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window._updateProfile                  = updateProfile;
    </script>
    <!-- Favicon -->
<link rel="icon" type="image/png" href="/main/minimalista.png">

<!-- Para o Google -->
<meta name="description" content="Gerencie suas metas e acompanhe seu progresso com o Meta Track.">

<!-- Open Graph (aparece ao compartilhar o link) -->
<meta property="og:title" content="Meta Track">
<meta property="og:description" content="Gerencie suas metas e acompanhe seu progresso.">
<meta property="og:image" content="https://meta-track-drab.vercel.app/main/minimalista.png">
<meta property="og:url" content="https://meta-track-drab.vercel.app">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <h2>Cadastro</h2>
            <form onsubmit="registerUser(event)">
                <div class="form-group">
                    <label for="register-name">Nome:</label>
                    <input type="text" id="register-name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="register-email">Email:</label>
                    <input type="email" id="register-email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="register-password">Senha:</label>
                    <input type="password" id="register-password" name="password" required>
                    <div id="password-strength" style="margin-top: 4px; font-size: 12px;"></div>
                </div>
                <div class="form-group">
                    <label for="register-confirm">Confirmar Senha:</label>
                    <input type="password" id="register-confirm" name="confirm" required>
                </div>
                <button type="submit" id="register-btn">Cadastrar</button>
            </form>
            <p>Já tem conta? <a href="login.html">Faça login</a></p>
            <p><a href="Inicial.html">Voltar ao início</a></p>
        </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script>
        document.getElementById('register-password').addEventListener('input', function () {
            const val = this.value;
            const el  = document.getElementById('password-strength');
            if (!val) { el.textContent = ''; return; }
            let score = 0;
            if (val.length >= 8)          score++;
            if (/[A-Z]/.test(val))        score++;
            if (/[0-9]/.test(val))        score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;
            const levels = [
                { label: 'Muito fraca', color: '#ff5252' },
                { label: 'Fraca',       color: '#ff5252' },
                { label: 'Média',       color: '#ffb74d' },
                { label: 'Forte',       color: '#81c784' },
                { label: 'Muito forte', color: '#4ecdc4' },
            ];
            el.textContent = `Força: ${levels[score].label}`;
            el.style.color = levels[score].color;
        });

        function showToast(message, type = 'default') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast';
            if (type === 'success') toast.classList.add('toast-success');
            if (type === 'error')   toast.classList.add('toast-error');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2300);
        }

        async function registerUser(event) {
            event.preventDefault();
            const name     = document.getElementById('register-name').value.trim();
            const email    = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const confirm  = document.getElementById('register-confirm').value;
            const btn      = document.getElementById('register-btn');

            if (password.length < 8) {
                showToast('A senha precisa ter ao menos 8 caracteres.', 'error'); return;
            }
            if (password !== confirm) {
                showToast('As senhas não coincidem.', 'error'); return;
            }

            btn.disabled = true; btn.textContent = 'Cadastrando...';

            try {
                const userCredential = await window._createUserWithEmailAndPassword(window._auth, email, password);
                await window._updateProfile(userCredential.user, { displayName: name });
                localStorage.setItem('currentUser', JSON.stringify({ name, email }));
                showToast('Usuário cadastrado com sucesso!', 'success');
                setTimeout(() => { window.location.href = 'Inicial.html'; }, 1000);
            } catch (error) {
                const msgs = {
                    'auth/email-already-in-use':  'Este email já está cadastrado.',
                    'auth/invalid-email':          'Email inválido.',
                    'auth/weak-password':          'Senha muito fraca.',
                    'auth/network-request-failed': 'Sem conexão. Verifique sua internet.',
                };
                showToast(msgs[error.code] || `Erro: ${error.message}`, 'error');
                btn.disabled = false; btn.textContent = 'Cadastrar';
            }
        }
    </script>
</body>
</html>
