<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MetaTrack — Crie sua conta e comece a gerenciar suas metas hoje.">
    <title>Cadastro - Meta Track</title>
    <link rel="icon" type="image/png" href="/main/minimalista.png">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey:            "AIzaSyDt_5U_ld8iDppsi9QFImrI4eBP61IgGc0",
            authDomain:        "ethania.firebaseapp.com",
            projectId:         "ethania",
            storageBucket:     "ethania.firebasestorage.app",
            messagingSenderId: "290971711529",
            appId:             "1:290971711529:web:655a835e54baeef36d4438",
            measurementId:     "G-DZDTQ0B676"
        };

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        window._auth                           = auth;
        window._createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window._updateProfile                  = updateProfile;
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 80% 10%, rgba(255,0,255,0.1) 0%, transparent 55%),
                radial-gradient(ellipse at 10% 80%, rgba(138,43,226,0.1) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(78,205,196,0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        .auth-card {
            background: #1a1a2e;
            border: 1px solid #2a2a4e;
            border-radius: 20px;
            padding: 2rem 2rem 2.25rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            position: relative;
            animation: cardIn 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #4ecdc4, #ff00ff, transparent);
            border-radius: 2px;
        }

        .auth-logo {
            display: block;
            max-width: 140px;
            height: auto;
            margin: 0 auto 1.25rem;
        }
        .auth-title    { text-align: center; font-size: 1.4rem; font-weight: 700; margin-bottom: 0.2rem; }
        .auth-subtitle { text-align: center; font-size: 0.8rem; color: #666; margin-bottom: 1.5rem; }

        .form-group { display: flex; flex-direction: column; gap: 0.28rem; margin-bottom: 0.85rem; }
        label { font-size: 0.76rem; font-weight: 600; color: #b0b0b0; }

        .input-wrapper { position: relative; }
        .input-icon {
            position: absolute; left: 0.75rem; top: 50%;
            transform: translateY(-50%); font-size: 0.82rem; pointer-events: none;
        }

        input[type="email"], input[type="password"], input[type="text"] {
            width: 100%;
            padding: 0.6rem 2.5rem 0.6rem 2.2rem;
            background: #0f0f1e;
            border: 1px solid #2a2a4e;
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 0.9rem;
            transition: border-color 0.25s, box-shadow 0.25s;
            outline: none;
        }
        input:focus { border-color: #ff00ff; box-shadow: 0 0 0 3px rgba(255,0,255,0.1); }
        input.valid   { border-color: #4caf50; }
        input.invalid { border-color: #ff5252; }

        .toggle-pw {
            position: absolute; right: 0.75rem; top: 50%;
            transform: translateY(-50%);
            background: none; border: none; color: #555;
            cursor: pointer; font-size: 0.82rem; padding: 0.1rem;
            transition: color 0.2s;
        }
        .toggle-pw:hover { color: #b0b0b0; }

        .strength-bar-wrapper {
            display: flex; gap: 3px; margin-top: 0.35rem;
        }
        .strength-bar-wrapper span {
            flex: 1; height: 3px; border-radius: 2px;
            background: #2a2a4e; transition: background 0.3s;
        }
        .strength-label { font-size: 0.7rem; margin-top: 0.2rem; transition: color 0.3s; }

        .pw-reqs { margin-top: 0.4rem; display: flex; flex-direction: column; gap: 0.15rem; }
        .pw-req  { font-size: 0.7rem; color: #555; display: flex; align-items: center; gap: 0.3rem; transition: color 0.2s; }
        .pw-req.ok { color: #4caf50; }
        .pw-req::before { content: '○'; font-size: 0.6rem; }
        .pw-req.ok::before { content: '✓'; }

        .btn-primary {
            width: 100%; padding: 0.72rem;
            background: linear-gradient(135deg, #8a2be2, #ff00ff);
            color: #fff; border: none; border-radius: 10px;
            font-size: 0.93rem; font-weight: 700; cursor: pointer;
            margin-top: 0.5rem;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(255,0,255,0.25);
        }
        .btn-primary:hover  { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,0,255,0.35); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .auth-links { margin-top: 1.1rem; display: flex; flex-direction: column; gap: 0.45rem; text-align: center; }
        .auth-links p { font-size: 0.8rem; color: #666; }
        .auth-links a { color: #b57bee; text-decoration: none; font-weight: 600; transition: color 0.2s; }
        .auth-links a:hover { color: #ff00ff; }

        .divider {
            display: flex; align-items: center; gap: 0.75rem;
            margin: 0.85rem 0; color: #444; font-size: 0.73rem;
        }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #2a2a4e; }

        .toast {
            position: fixed; bottom: 2rem; left: 50%;
            transform: translateX(-50%) translateY(20px);
            padding: 0.75rem 1.5rem; border-radius: 10px;
            font-size: 0.88rem; font-weight: 500; opacity: 0;
            pointer-events: none; transition: opacity 0.3s, transform 0.3s;
            z-index: 99999; min-width: 240px; text-align: center;
            background: #1f1f3e; color: #e0e0e0; border: 1px solid #555;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast-success { background: #1a3a2e; color: #81c784; border-color: #4caf50; }
        .toast-error   { background: #3a1a1a; color: #ff6b6b; border-color: #ff5252; }

        @media (max-width: 480px) {
            .auth-card { padding: 1.5rem 1.1rem 1.75rem; }
            .auth-title { font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <img src="main/2logo-removebg-preview.png" alt="MetaTrack" class="auth-logo">
        <h1 class="auth-title">Crie sua conta</h1>
        <p class="auth-subtitle">Comece a conquistar suas metas hoje</p>

        <form onsubmit="registerUser(event)">
            <div class="form-group">
                <label for="register-name">Nome</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="register-name" placeholder="Seu nome" required autocomplete="name">
                </div>
            </div>
            <div class="form-group">
                <label for="register-email">Email</label>
                <div class="input-wrapper">
                    <span class="input-icon">✉️</span>
                    <input type="email" id="register-email" placeholder="seu@email.com" required autocomplete="email">
                </div>
            </div>
            <div class="form-group">
                <label for="register-password">Senha</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="register-password" placeholder="Mín. 8 caracteres" required autocomplete="new-password">
                    <button type="button" class="toggle-pw" onclick="togglePw('register-password', this)">👁️</button>
                </div>
                <div class="strength-bar-wrapper">
                    <span id="sb1"></span><span id="sb2"></span>
                    <span id="sb3"></span><span id="sb4"></span>
                </div>
                <div id="strength-label" class="strength-label"></div>
                <div class="pw-reqs">
                    <div class="pw-req" id="req-len">Mínimo 8 caracteres</div>
                    <div class="pw-req" id="req-upper">Uma letra maiúscula</div>
                    <div class="pw-req" id="req-num">Um número</div>
                    <div class="pw-req" id="req-special">Um caractere especial</div>
                </div>
            </div>
            <div class="form-group">
                <label for="register-confirm">Confirmar senha</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔑</span>
                    <input type="password" id="register-confirm" placeholder="Repita a senha" required autocomplete="new-password">
                    <button type="button" class="toggle-pw" onclick="togglePw('register-confirm', this)">👁️</button>
                </div>
                <div id="confirm-hint" style="font-size:0.7rem; margin-top:0.2rem;"></div>
            </div>
            <button type="submit" id="register-btn" class="btn-primary">Criar conta</button>
        </form>

        <div class="auth-links">
            <div class="divider">ou</div>
            <p>Já tem conta? <a href="login.html">Faça login</a></p>
            <p><a href="Inicial.html">← Voltar ao início</a></p>
        </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script>
        function togglePw(id, btn) {
            const input = document.getElementById(id);
            input.type  = input.type === 'password' ? 'text' : 'password';
            btn.textContent = input.type === 'text' ? '🙈' : '👁️';
        }

        function showToast(msg, type = 'default') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast' + (type === 'success' ? ' toast-success' : type === 'error' ? ' toast-error' : '');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        const pwInput      = document.getElementById('register-password');
        const confirmInput = document.getElementById('register-confirm');

        const levels = [
            { label: 'Muito fraca', color: '#ff5252', bars: 1 },
            { label: 'Fraca',       color: '#ff7043', bars: 1 },
            { label: 'Média',       color: '#ffb74d', bars: 2 },
            { label: 'Forte',       color: '#81c784', bars: 3 },
            { label: 'Muito forte', color: '#4ecdc4', bars: 4 },
        ];
        const barColors = ['#ff5252','#ff7043','#ffb74d','#81c784','#4ecdc4'];

        pwInput.addEventListener('input', () => {
            const v = pwInput.value;
            let score = 0;
            const len     = v.length >= 8;
            const upper   = /[A-Z]/.test(v);
            const num     = /[0-9]/.test(v);
            const special = /[^A-Za-z0-9]/.test(v);
            if (len)     score++;
            if (upper)   score++;
            if (num)     score++;
            if (special) score++;

            document.getElementById('req-len').classList.toggle('ok', len);
            document.getElementById('req-upper').classList.toggle('ok', upper);
            document.getElementById('req-num').classList.toggle('ok', num);
            document.getElementById('req-special').classList.toggle('ok', special);

            const lvl = v.length === 0 ? -1 : score - 1;
            for (let i = 1; i <= 4; i++) {
                const bar = document.getElementById(`sb${i}`);
                bar.style.background = lvl >= 0 && i <= levels[lvl].bars ? barColors[lvl] : '#2a2a4e';
            }
            const lbl = document.getElementById('strength-label');
            if (v.length === 0) { lbl.textContent = ''; return; }
            lbl.textContent = `Força: ${levels[lvl].label}`;
            lbl.style.color = levels[lvl].color;

            if (confirmInput.value) checkConfirm();
        });

        function checkConfirm() {
            const hint  = document.getElementById('confirm-hint');
            const match = pwInput.value === confirmInput.value;
            hint.textContent = confirmInput.value ? (match ? '✓ Senhas coincidem' : '✗ Senhas não coincidem') : '';
            hint.style.color = match ? '#4caf50' : '#ff5252';
        }
        confirmInput.addEventListener('input', checkConfirm);

        async function registerUser(e) {
            e.preventDefault();
            const name    = document.getElementById('register-name').value.trim();
            const email   = document.getElementById('register-email').value.trim();
            const pw      = pwInput.value;
            const confirm = confirmInput.value;
            const btn     = document.getElementById('register-btn');

            if (pw.length < 8) { showToast('A senha precisa ter ao menos 8 caracteres.', 'error'); return; }
            if (pw !== confirm) { showToast('As senhas não coincidem.', 'error'); return; }

            btn.disabled = true; btn.textContent = 'Criando conta...';
            try {
                const cred = await window._createUserWithEmailAndPassword(window._auth, email, pw);
                await window._updateProfile(cred.user, { displayName: name });
                localStorage.setItem('currentUser', JSON.stringify({ name, email }));
                showToast('Conta criada com sucesso! 🎉', 'success');
                setTimeout(() => { window.location.href = 'Inicial.html'; }, 1100);
            } catch (err) {
                const msgs = {
                    'auth/email-already-in-use':  'Este email já está cadastrado.',
                    'auth/invalid-email':          'Email inválido.',
                    'auth/weak-password':          'Senha muito fraca.',
                    'auth/network-request-failed': 'Sem conexão. Verifique sua internet.',
                };
                showToast(msgs[err.code] || `Erro: ${err.message}`, 'error');
                btn.disabled = false; btn.textContent = 'Criar conta';
            }
        }
    </script>
</body>
</html>
