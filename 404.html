<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MetaTrack — Página não encontrada.">
    <title>Página não encontrada - Meta Track</title>
    <link rel="stylesheet" href="Inicial.css">
    <style>
        .not-found-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
            background-color: #0a0a0a;
        }
        .not-found-code {
            font-size: 6rem;
            font-weight: bold;
            color: #ff00ff;
            line-height: 1;
            margin-bottom: 1rem;
        }
        .not-found-title {
            font-size: 1.8rem;
            color: #e0e0e0;
            margin-bottom: 0.5rem;
        }
        .not-found-desc {
            font-size: 1rem;
            color: #b0b0b0;
            margin-bottom: 2rem;
        }
        .not-found-btn {
            background: #ff00ff;
            color: #0a0a0a;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.2s;
        }
        .not-found-btn:hover {
            background: #cc00cc;
        }
    </style>
</head>
<body>
    <div class="not-found-page">
        <div class="not-found-code">404</div>
        <div class="not-found-title">Página não encontrada</div>
        <div class="not-found-desc">A página que você está procurando não existe ou foi movida.</div>
        <a href="Inicial.html" class="not-found-btn">🏠 Voltar ao início</a>
    </div>
</body>
</html>
